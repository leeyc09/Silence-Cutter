<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cutGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- Waveform — left -->
  <g transform="translate(100, 310)">
    <rect x="0" y="70" width="32" height="80" rx="16" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="48" y="40" width="32" height="140" rx="16" fill="url(#waveGrad)" opacity="0.65"/>
    <rect x="96" y="15" width="32" height="190" rx="16" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="144" y="0" width="32" height="220" rx="16" fill="url(#waveGrad)" opacity="0.95"/>
    <rect x="192" y="25" width="32" height="170" rx="16" fill="url(#waveGrad)" opacity="0.85"/>
    <rect x="240" y="50" width="32" height="120" rx="16" fill="url(#waveGrad)" opacity="0.65"/>
    <rect x="288" y="70" width="32" height="80" rx="16" fill="url(#waveGrad)" opacity="0.45"/>
  </g>

  <!-- Waveform — right -->
  <g transform="translate(600, 310)">
    <rect x="0" y="70" width="32" height="80" rx="16" fill="url(#waveGrad)" opacity="0.45"/>
    <rect x="48" y="45" width="32" height="130" rx="16" fill="url(#waveGrad)" opacity="0.65"/>
    <rect x="96" y="20" width="32" height="180" rx="16" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="144" y="5" width="32" height="210" rx="16" fill="url(#waveGrad)" opacity="0.95"/>
    <rect x="192" y="30" width="32" height="160" rx="16" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="240" y="55" width="32" height="110" rx="16" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="288" y="75" width="32" height="70" rx="16" fill="url(#waveGrad)" opacity="0.4"/>
  </g>

  <!-- Scissors — center, big and bold -->
  <g transform="translate(512, 420)">
    <!-- Cut line glow -->
    <line x1="0" y1="-200" x2="0" y2="200" stroke="#f43f5e" stroke-width="3" stroke-linecap="round" opacity="0.2"/>

    <!-- Top ring (finger hole) -->
    <circle cx="-60" cy="-120" r="42" fill="none" stroke="url(#cutGrad)" stroke-width="11"/>
    <!-- Bottom ring (finger hole) -->
    <circle cx="-60" cy="120" r="42" fill="none" stroke="url(#cutGrad)" stroke-width="11"/>

    <!-- Top blade — long line from ring to far right -->
    <line x1="-25" y1="-85" x2="140" y2="15" stroke="url(#cutGrad)" stroke-width="11" stroke-linecap="round"/>
    <!-- Bottom blade — long line from ring to far right -->
    <line x1="-25" y1="85" x2="140" y2="-15" stroke="url(#cutGrad)" stroke-width="11" stroke-linecap="round"/>

    <!-- Pivot bolt -->
    <circle cx="56" cy="0" r="12" fill="#f43f5e"/>
    <circle cx="56" cy="0" r="6" fill="#1e293b"/>
  </g>

  <!-- App name -->
  <text x="512" y="880" text-anchor="middle" fill="white" font-family="SF Pro Display,system-ui,-apple-system,sans-serif" font-size="96" font-weight="800" letter-spacing="8" opacity="0.95">Silenci</text>
</svg>
